<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linda's Photo Journal</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header>
    <h1>Linda's Photo Journal</h1>
    <p class="subtitle">city streets &amp; weekend wanderings</p>
  </header>

  <main class="gallery">

    <figure class="polaroid tilt-left">
      <img src="images/DSC03649.JPG" alt="Photo 1" />
      <figcaption>corner light</figcaption>
    </figure>

    <figure class="polaroid tilt-right">
      <img src="images/DSC03699.JPG" alt="Photo 2" />
      <figcaption>golden hour, somewhere</figcaption>
    </figure>

    <figure class="polaroid tilt-slight">
      <img src="images/DSC03811.JPG" alt="Photo 3" />
      <figcaption>saturday, the vineyard</figcaption>
    </figure>

    <figure class="polaroid tilt-left-more">
      <img src="images/DSC03990.JPG" alt="Photo 4" />
      <figcaption>between the vines</figcaption>
    </figure>

    <figure class="polaroid tilt-right-more">
      <img src="images/DSC03991.JPG" alt="Photo 5" />
      <figcaption>city after rain</figcaption>
    </figure>

  </main>

  <footer>
    <p>&#x2728; photo class, spring 2026</p>
  </footer>

</body>
</html>
